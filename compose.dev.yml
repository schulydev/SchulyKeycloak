# Local development for the Schuly Keycloak image.
#   docker compose -f compose.dev.yml up --build
# Admin console: http://localhost:8080  (admin / admin)
# The `schuly` realm is imported from ./realms on first start.
services:
  keycloak:
    build: .
    container_name: schuly-keycloak-dev
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./realms:/opt/keycloak/data/import:ro
      - keycloak-data-dev:/opt/keycloak/data

volumes:
  keycloak-data-dev:
